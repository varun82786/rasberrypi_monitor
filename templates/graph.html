<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Detailed historical analysis for {{ field_name }} — Raspberry Pi system monitor.">
  <title>{{ field_name }} Analysis — RPi Monitor</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/graph.css') }}">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Lucide icons (stroke-based, minimalist) -->
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>

  <!-- Field data for JavaScript -->
  <script>
    window.CURRENT_FIELD = '{{ field }}';
    window.FIELD_LABELS = {
      'field1': 'CPU Temperature (°C)',
      'field2': 'GPU Temperature (°C)',
      'field3': 'CPU Usage (%)',
      'field4': 'Memory Usage (GB)',
      'field5': 'Disk Usage (GB)',
      'field6': 'Bytes Sent',
      'field7': 'Bytes Received',
      'field8': 'System Uptime (hours)',
      'network': 'Network Traffic'
    };
    window.FIELD_NAMES = {
      'field1': 'CPU Temperature',
      'field2': 'GPU Temperature',
      'field3': 'CPU Usage',
      'field4': 'Memory Usage',
      'field5': 'Disk Usage',
      'field6': 'Bytes Sent',
      'field7': 'Bytes Received',
      'field8': 'System Uptime',
      'network': 'Network I/O'
    };
  </script>
</head>
<body class="graph-page">

<!-- ══ NAVBAR ══════════════════════════════════════════════ -->
<nav class="navbar" role="navigation" aria-label="Main navigation">
  <a href="/" class="nav-logo" aria-label="RPi Monitor home">
    <div class="nav-logo-icon" aria-hidden="true">
      <i data-lucide="cpu"></i>
    </div>
    <span class="nav-logo-text">RPi Monitor <span>/ Analysis</span></span>
  </a>

  <div class="nav-divider" aria-hidden="true"></div>

  <a href="/" class="back-link" aria-label="Return to dashboard">
    <i data-lucide="arrow-left" aria-hidden="true"></i>
    Dashboard
  </a>

  <div class="nav-collapse" id="nav-collapse">
    <div class="nav-meta">
      <span id="last-update-graph" style="font-size:12px; color: var(--text-3);">&mdash;</span>
      <button class="btn-nav btn-sm" onclick="exportCurrentData()" title="Export current data as CSV" aria-label="Export data">
        <i data-lucide="download" aria-hidden="true"></i>
        Export
      </button>
    </div>
  </div>

  <!-- Mobile hamburger -->
  <button class="nav-hamburger" id="hamburger-btn" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-collapse">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- ══ MAIN CONTENT ════════════════════════════════════════ -->
<main class="main" id="main-content">
  <div class="container">

    <!-- Page Header -->
    <header class="page-header animate-in">
      <div>
        <h1 class="page-title" id="graph-page-title">{{ field_name }} Analysis</h1>
        <p class="page-subtitle">Historical data — select a time range below</p>
      </div>
    </header>

    <!-- ── STATS ROW ─────────────────────────────────────── -->
    <section class="stats-grid animate-in" aria-label="Data statistics">
      <div class="stat-card">
        <div class="stat-label">Current</div>
        <div class="stat-value" id="current-value">&mdash;</div>
        <div class="stat-unit" id="stat-unit-current"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Average</div>
        <div class="stat-value" id="average-value">&mdash;</div>
        <div class="stat-unit" id="stat-unit-avg"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Minimum</div>
        <div class="stat-value" id="min-value">&mdash;</div>
        <div class="stat-unit" id="stat-unit-min"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Maximum</div>
        <div class="stat-value" id="max-value">&mdash;</div>
        <div class="stat-unit" id="stat-unit-max"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Data Points</div>
        <div class="stat-value" id="data-points">&mdash;</div>
        <div class="stat-unit">entries</div>
      </div>
    </section>

    <!-- ── TIME RANGE ────────────────────────────────────── -->
    <div class="time-range-container animate-in" role="group" aria-label="Select time range">
      <div class="segment-group">
        <button class="segment-btn active" data-period="live"  aria-pressed="true">Live</button>
        <button class="segment-btn" data-period="30min"  aria-pressed="false">30m</button>
        <button class="segment-btn" data-period="1hr"    aria-pressed="false">1h</button>
        <button class="segment-btn" data-period="3hrs"   aria-pressed="false">3h</button>
        <button class="segment-btn" data-period="6hrs"   aria-pressed="false">6h</button>
        <button class="segment-btn" data-period="12hrs"  aria-pressed="false">12h</button>
        <button class="segment-btn" data-period="24hrs"  aria-pressed="false">24h</button>
        <button class="segment-btn" data-period="48hrs"  aria-pressed="false">48h</button>
        <button class="segment-btn" data-period="72hrs"  aria-pressed="false">72h</button>
      </div>
    </div>

    <!-- ── CHART ─────────────────────────────────────────── -->
    <section class="chart-card animate-in" aria-label="Historical chart">
      <div class="chart-card-header">
        <div class="chart-title" id="chart-card-title">
          <div class="chart-title-icon" id="chart-icon-chip" aria-hidden="true">
            <i data-lucide="trending-up"></i>
          </div>
          <span id="chart-title-text">Loading&hellip;</span>
        </div>
        <div class="chart-actions">
          <button class="btn btn-sm btn-icon" onclick="exportCurrentData()" title="Export data as CSV" aria-label="Export CSV">
            <i data-lucide="download" aria-hidden="true"></i>
          </button>
        </div>
      </div>
      <div class="chart-body" id="chart-body-wrapper">
        <!-- Loading state -->
        <div class="chart-loading" id="loading-indicator">
          <div class="spinner" aria-hidden="true"></div>
          <span>Loading data&hellip;</span>
        </div>
        <!-- Canvas -->
        <canvas id="graphCanvas" style="display:none;" aria-label="Historical data chart" role="img"></canvas>
      </div>
    </section>

    <!-- Debug (hidden, kept for compat) -->
    <div id="debug-info" style="display:none;" aria-hidden="true">
      <p><strong>Field:</strong> {{ field }}</p>
      <p><strong>Label:</strong> <span id="debug-field-label"></span></p>
      <p><strong>Chart.js:</strong> <span id="debug-chartjs"></span></p>
      <p><strong>Canvas:</strong> <span id="debug-canvas"></span></p>
    </div>
    <div id="min-max-values" style="display:none;"></div>

    <!-- Shortcuts -->
    <div class="shortcuts-bar" role="note">
      <i data-lucide="keyboard" aria-hidden="true"></i>
      <kbd>Ctrl+R</kbd> Refresh &nbsp;&middot;&nbsp; <kbd>Ctrl+E</kbd> Export
    </div>

  </div>
</main>

<script src="{{ url_for('static', filename='js/graph.js') }}"></script>
<script>lucide.createIcons();</script>
</body>
</html>
